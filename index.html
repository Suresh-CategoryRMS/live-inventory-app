<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>ROYALOAK LIVE INVENTORY</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI,sans-serif;
}

body{
    background:#f4f5fb;
    padding:20px;
    color:#111827;
}

/* TOP BAR */

.top-bar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:20px;
    margin-bottom:25px;
    flex-wrap:wrap;
}

.search-box{
    width:380px;
    max-width:100%;
    height:58px;
    border-radius:18px;
    border:2px solid #111;
    padding:0 20px;
    font-size:22px;
    background:#fff;
    outline:none;
}

.export-btn{
    border:none;
    background:#d4a62f;
    color:#fff;
    font-size:20px;
    font-weight:600;
    padding:16px 28px;
    border-radius:18px;
    cursor:pointer;
}

/* CARDS */

.cards{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:20px;
    margin-bottom:25px;
}

.card{
    background:#fff;
    border-radius:24px;
    padding:30px;
    min-height:150px;
}

.card-title{
    color:#6b7280;
    font-size:20px;
    font-weight:700;
    margin-bottom:15px;
}

.card-value{
    font-size:58px;
    font-weight:800;
}

/* TABLE */

.table-section{
    background:#fff;
    border-radius:30px;
    padding:30px;
    overflow:auto;
}

.table-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:30px;
    gap:20px;
    flex-wrap:wrap;
}

.table-title{
    font-size:48px;
    font-weight:800;
}

.store-search{
    width:260px;
    max-width:100%;
    height:52px;
    border:none;
    border-radius:16px;
    background:#f3f4f6;
    padding:0 18px;
    font-size:18px;
    outline:none;
}

table{
    width:100%;
    border-collapse:collapse;
    min-width:1000px;
}

th{
    text-align:left;
    padding:18px;
    font-size:24px;
    border-bottom:2px solid #e5e7eb;
}

td{
    padding:20px 18px;
    font-size:22px;
    border-bottom:1px solid #e5e7eb;
}

.qty{
    font-weight:700;
}

/* MOBILE */

@media(max-width:1200px){

.cards{
    grid-template-columns:repeat(2,1fr);
}

}

@media(max-width:768px){

body{
    padding:14px;
}

.cards{
    grid-template-columns:1fr;
}

.card{
    min-height:auto;
    padding:22px;
}

.card-title{
    font-size:18px;
}

.card-value{
    font-size:42px;
}

.table-title{
    font-size:34px;
}

th{
    font-size:18px;
}

td{
    font-size:16px;
}

.search-box{
    width:100%;
    font-size:18px;
}

.export-btn{
    width:100%;
}

}
</style>
</head>

<body>

<!-- TOP -->

<div class="top-bar">

    <input
        type="text"
        id="itemSearch"
        class="search-box"
        placeholder="Search Item Code"
    />

    <button class="export-btn" onclick="exportTable()">
        Export
    </button>

</div>

<!-- CARDS -->

<div class="cards">

    <div class="card">
        <div class="card-title">Total Qty</div>
        <div class="card-value" id="totalQty">0</div>
    </div>

    <div class="card">
        <div class="card-title">Low Stock</div>
        <div class="card-value" id="lowStock">0</div>
    </div>

    <div class="card">
        <div class="card-title">Out Of Stock</div>
        <div class="card-value" id="outStock">0</div>
    </div>

    <div class="card">
        <div class="card-title">Total Stores</div>
        <div class="card-value" id="totalStores">0</div>
    </div>

</div>

<!-- TABLE -->

<div class="table-section">

    <div class="table-header">

        <div class="table-title">
            Live Inventory
        </div>

        <input
            type="text"
            id="storeSearch"
            class="store-search"
            placeholder="Search Store"
        />

    </div>

    <table id="inventoryTable">

        <thead>
            <tr>
                <th>Store</th>
                <th>Item Code</th>
                <th>Description</th>
                <th>Site</th>
                <th>Available Qty</th>
                <th>Reserved Qty</th>
                <th>Total Qty</th>
            </tr>
        </thead>

        <tbody id="inventoryBody">

        </tbody>

    </table>

</div>

<script>

const API_URL =
"https://royaloakerp.operations.dynamics.com/data/WarehousesOnHandV2";

let inventoryData = [];

async function fetchInventory(){

    try{

        const response = await fetch(API_URL,{
            credentials:"include"
        });

        const data = await response.json();

        inventoryData = data.value || [];

        loadDashboard(inventoryData);

    }catch(error){

        console.error("Inventory Fetch Error:",error);

        alert("Failed to load inventory.");

    }

}

function loadDashboard(data){

    const tbody = document.getElementById("inventoryBody");

    tbody.innerHTML = "";

    let totalQty = 0;
    let lowStock = 0;
    let outStock = 0;

    const stores = new Set();

    data.forEach(item=>{

        const availableQty =
        Number(item.AvailableOnHandQuantity || 0);

        const reservedQty =
        Number(item.ReservedOnHandQuantity || 0);

        const totalAvailable =
        Number(item.TotalAvailableQuantity || 0);

        totalQty += totalAvailable;

        if(totalAvailable <= 5 && totalAvailable > 0){
            lowStock++;
        }

        if(totalAvailable <= 0){
            outStock++;
        }

        stores.add(item.InventoryWarehouseId);

        tbody.innerHTML += `
        <tr>
            <td>${item.InventoryWarehouseId || ""}</td>
            <td>${item.ItemNumber || ""}</td>
            <td>${item.ProductName || ""}</td>
            <td>${item.InventorySiteId || ""}</td>
            <td class="qty">${availableQty}</td>
            <td class="qty">${reservedQty}</td>
            <td class="qty">${totalAvailable}</td>
        </tr>
        `;

    });

    document.getElementById("totalQty").innerText =
    totalQty;

    document.getElementById("lowStock").innerText =
    lowStock;

    document.getElementById("outStock").innerText =
    outStock;

    document.getElementById("totalStores").innerText =
    stores.size;

}

/* SEARCH ITEM */

document
.getElementById("itemSearch")
.addEventListener("input",function(){

    const value =
    this.value.toLowerCase();

    const filtered =
    inventoryData.filter(item=>
        (item.ItemNumber || "")
        .toLowerCase()
        .includes(value)
    );

    loadDashboard(filtered);

});

/* SEARCH STORE */

document
.getElementById("storeSearch")
.addEventListener("input",function(){

    const value =
    this.value.toLowerCase();

    const filtered =
    inventoryData.filter(item=>
        (item.InventoryWarehouseId || "")
        .toLowerCase()
        .includes(value)
    );

    loadDashboard(filtered);

});

/* EXPORT */

function exportTable(){

    let csv = [];

    const rows =
    document.querySelectorAll("table tr");

    rows.forEach(row=>{

        let cols =
        row.querySelectorAll("td,th");

        let rowData = [];

        cols.forEach(col=>
            rowData.push(col.innerText)
        );

        csv.push(rowData.join(","));

    });

    const csvFile =
    new Blob([csv.join("\n")],{
        type:"text/csv"
    });

    const downloadLink =
    document.createElement("a");

    downloadLink.download =
    "LiveInventory.csv";

    downloadLink.href =
    window.URL.createObjectURL(csvFile);

    downloadLink.style.display =
    "none";

    document.body.appendChild(downloadLink);

    downloadLink.click();

}

/* LOAD */

fetchInventory();

</script>

</body>
</html>
