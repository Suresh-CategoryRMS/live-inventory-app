<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live Inventory Dashboard</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

<div class="dashboard-container">

  <header class="top-header">

    <div>
      <h1>Live Inventory Dashboard</h1>
      <p>Real-Time Inventory Visibility</p>
    </div>

    <div class="brand-logo">
      ROYALOAK
    </div>

    <div class="header-actions">
      <button class="header-btn">Refresh</button>
      <button class="header-btn export-btn">Export</button>
    </div>

  </header>

  <section class="filters-section">

    <div class="filter-box">
      <label>Item Code</label>
      <input type="text" id="itemSearch" placeholder="Enter Item Code">
    </div>

    <div class="filter-box">
      <label>Store</label>
      <input type="text" id="storeSearch" placeholder="Enter Store Code">
    </div>

    <div class="filter-box">
      <label>Category</label>
      <select>
        <option>All Categories</option>
        <option>Bedroom</option>
        <option>Sofa</option>
        <option>Dining</option>
      </select>
    </div>

    <div class="filter-box">
      <label>Grade</label>
      <select>
        <option>All Grades</option>
        <option>A</option>
        <option>B</option>
        <option>NPP</option>
      </select>
    </div>

    <div class="filter-box search-btn-box">
      <button id="searchBtn">Search</button>
    </div>

  </section>

  <section class="kpi-grid">

</html>
